services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: academyops
      POSTGRES_PASSWORD: academyops
      POSTGRES_DB: academyops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academyops"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Schema init (runs once, then exits) ───────────────────────────────────
  init:
    build: .
    command: python scripts/init_db.py
    environment:
      DATABASE_URL: postgresql://academyops:academyops@db:5432/academyops
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ── FastAPI backend & Web CRM Dashboard ───────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://academyops:academyops@db:5432/academyops
      DEBUG: "false"
      SECRET_KEY: academyops_production_key_random_abc_123 # Example security key override
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully

volumes:
  postgres_data:
