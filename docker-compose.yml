services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: academyops
      POSTGRES_PASSWORD: academyops
      POSTGRES_DB: academyops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academyops"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Schema init (runs once, then exits) ───────────────────────────────────
  init:
    build: .
    command: python scripts/init_db.py
    environment:
      DATABASE_URL: postgresql://academyops:academyops@db:5432/academyops
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ── FastAPI backend ───────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://academyops:academyops@db:5432/academyops
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully

  # ── Streamlit dashboard ───────────────────────────────────────────────────
  dashboard:
    build: .
    command: >
      streamlit run src/dashboard/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --logger.level error
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000/api/v1
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres_data:
